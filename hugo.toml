baseURL = 'https://y30n9ju1v.github.io/'
languageCode = 'en-us'
title = "y30n9ju1v's Blog"
theme = "hugo-book"

# hugo-book menu config
[[menu.main]]
  name = "Archives"
  url = "/archives/"
  weight = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]

[params]
  # hugo-book specific settings
  BookTheme = 'auto'         # light, dark, or auto
  BookToC = true            # table of contents on right
  BookComments = true       # enable comments partial
  BookSearch = true         # enable search
  BookSection = 'posts'     # show posts in the menu
  BookSectionName = 'Blog'  # label for the section in menu
